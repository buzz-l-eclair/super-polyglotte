<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polyglotte — Apprenez 4 langues</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ═══ AUTH SCREEN ══════════════════════════════════════════════════════════ -->
<div id="screen-auth" class="screen active">
  <div class="auth-bg">
    <div class="auth-card">
      <div class="logo-block">
        <div class="logo-icon">🌍</div>
        <h1 class="logo-title">Polyglotte</h1>
        <p class="logo-sub">Russe · Persan · Hébreu · Arabe</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="register">Inscription</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login" class="auth-form active">
        <div class="form-group">
          <label>Email ou pseudo</label>
          <input id="login-identifier" type="text" placeholder="votre@email.com ou pseudo" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn-primary" onclick="doLogin()">Se connecter</button>
        <div class="divider"><span>ou</span></div>
        <div id="g_id_signin_btn" class="google-btn-wrap"></div>
        <button class="btn-ghost" onclick="doGuest()">Continuer comme invité</button>
      </div>

      <!-- REGISTER -->
      <div id="tab-register" class="auth-form hidden">
        <div class="form-group">
          <label>Pseudo</label>
          <input id="reg-username" type="text" placeholder="MonPseudo123" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="reg-email" type="email" placeholder="votre@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Mot de passe (6 caractères min.)</label>
          <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button class="btn-primary" onclick="doRegister()">Créer mon compte</button>
        <div class="divider"><span>ou</span></div>
        <div id="g_id_signin_btn2" class="google-btn-wrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ HOME SCREEN ═══════════════════════════════════════════════════════════ -->
<div id="screen-home" class="screen hidden">
  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">🌍 Polyglotte</span>
    </div>
    <div class="header-right">
      <div class="header-xp">⚡ <span id="hdr-xp">0</span> XP</div>
      <div class="header-streak">🔥 <span id="hdr-streak">1</span></div>
      <button class="btn-icon" onclick="showLeaderboard()">🏆</button>
      <button class="btn-icon" onclick="doLogout()">🚪</button>
    </div>
  </header>

  <main class="home-main">
    <div class="welcome-banner">
      <h2>Bonjour <span id="home-username">ami</span> 👋</h2>
      <p>Quelle langue souhaitez-vous pratiquer aujourd'hui ?</p>
    </div>

    <div class="lang-grid" id="lang-grid">
      <!-- generated by JS -->
    </div>
  </main>
</div>

<!-- ═══ LANGUAGE SCREEN ══════════════════════════════════════════════════════ -->
<div id="screen-lang" class="screen hidden">
  <header class="app-header">
    <button class="btn-icon" onclick="showScreen('home')">←</button>
    <span id="lang-header-title" class="header-logo"></span>
    <div class="header-right">
      <div class="header-xp">⚡ <span id="lang-hdr-xp">0</span> XP</div>
      <div class="header-streak">🔥 <span id="lang-hdr-streak">1</span></div>
    </div>
  </header>

  <main class="lang-main">
    <div id="level-selector" class="level-pills">
      <button class="pill active" data-lvl="A1">A1</button>
      <button class="pill" data-lvl="A2">A2</button>
      <button class="pill" data-lvl="B1">B1</button>
    </div>
    <div id="adaptive-banner" class="adaptive-banner hidden">
      <span id="adaptive-msg"></span>
      <div class="adaptive-actions">
        <button onclick="skipToNextLevel()">Passer au niveau supérieur →</button>
        <button onclick="slowDownLevel()">← Retourner au niveau précédent</button>
      </div>
    </div>
    <div id="units-container" class="units-container"></div>
  </main>
</div>

<!-- ═══ LESSON SCREEN ════════════════════════════════════════════════════════ -->
<div id="screen-lesson" class="screen hidden">
  <header class="lesson-header">
    <button class="btn-icon" onclick="exitLesson()">✕</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="lesson-progress-bar"></div>
    </div>
    <div class="lesson-lives" id="lesson-lives">❤️❤️❤️</div>
  </header>

  <main class="lesson-main" id="lesson-main">
    <!-- Exercice rendu par JS -->
  </main>

  <footer class="lesson-footer" id="lesson-footer">
    <button class="btn-check" id="btn-check" onclick="checkAnswer()">Vérifier</button>
  </footer>
</div>

<!-- ═══ RESULT SCREEN ═════════════════════════════════════════════════════════ -->
<div id="screen-result" class="screen hidden">
  <div class="result-card">
    <div id="result-icon" class="result-icon">🎉</div>
    <h2 id="result-title">Leçon terminée !</h2>
    <p id="result-subtitle"></p>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="res-xp">0</div><div class="stat-lbl">XP</div></div>
      <div class="stat-box"><div class="stat-val" id="res-acc">0%</div><div class="stat-lbl">Précision</div></div>
      <div class="stat-box"><div class="stat-val" id="res-streak">1</div><div class="stat-lbl">Série 🔥</div></div>
    </div>
    <button class="btn-primary" onclick="afterLesson()">Continuer</button>
  </div>
</div>

<!-- ═══ LEADERBOARD MODAL ════════════════════════════════════════════════════ -->
<div id="modal-leaderboard" class="modal hidden">
  <div class="modal-card">
    <div class="modal-header">
      <h3>🏆 Classement</h3>
      <button onclick="closeModal('modal-leaderboard')">✕</button>
    </div>
    <div id="leaderboard-list" class="leaderboard-list"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="curriculum.js"></script>
<script src="app.js"></script>
</body>
</html>
