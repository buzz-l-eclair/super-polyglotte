services:
  - type: web
    name: polyglotte
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: DB_PATH
        value: /var/data/polyglotte.db
    disk:
      name: polyglotte-data
      mountPath: /var/data
      sizeGB: 1
